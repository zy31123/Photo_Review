<h2>随机浏览入口应该放在哪里？</h2>
<p class="subtitle">目前随机浏览只是审阅页工具栏右侧一个小图标，不够显眼</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>首页双入口</h3>
      <p>首页增加「顺序审阅」和「随机浏览」两个等大的入口按钮，随机浏览成为与审阅平级的主要功能</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>顶部导航栏</h3>
      <p>在所有页面顶部添加统一导航栏（首页/审阅/随机浏览），随时可切换到随机浏览</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>审阅页内更突出</h3>
      <p>保持当前单页应用结构，但在审阅页把随机浏览按钮做得更醒目（更大、带文字标签、颜色区分）</p>
    </div>
  </div>
</div>
