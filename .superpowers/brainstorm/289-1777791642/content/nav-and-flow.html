<div class="section" style="margin-top:24px;">
  <h3>页面流转</h3>
  <div class="mockup">
    <div class="mockup-body" style="background:#0d1117;padding:16px;">
      <div style="display:flex;flex-direction:column;gap:12px;align-items:center;">
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="padding:12px 20px;background:#1f6feb;border-radius:8px;color:#fff;font-size:13px;text-align:center;min-width:100px;">首页<br><span style="font-size:10px;color:#a5d6ff;">选择文件夹</span></div>
          <div style="color:#8b949e;font-size:18px;">→</div>
          <div style="padding:12px 20px;background:#238636;border-radius:8px;color:#fff;font-size:13px;text-align:center;min-width:100px;">网格总览<br><span style="font-size:10px;color:#a5d6ff;">缩略图平铺</span></div>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="padding:12px 20px;background:#8957e5;border-radius:8px;color:#fff;font-size:13px;text-align:center;min-width:100px;">顺序审阅<br><span style="font-size:10px;color:#d2a8ff;">单张浏览</span></div>
          <div style="color:#8b949e;font-size:14px;">↔</div>

        </div>

      <div style="text-align:center;color:#484f58;font-size:12px;margin-top:12px;">底部三个页面可通过导航栏随时切换（需已加载文件夹）</div>

  </div>
</div>
