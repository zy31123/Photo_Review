<h2>首页图片网格布局</h2>
<p class="subtitle">当前首页只是一个文件夹路径输入框，你希望改成图片平铺浏览</p>

<div class="cards">
  <div class="card" data-choice="a" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background:#1a1a2e;padding:16px;min-height:200px;display:flex;flex-direction:column;gap:8px;">
        <div style="display:flex;gap:8px;align-items:center;padding:8px 12px;background:#16213e;border-radius:6px;">
          <div style="width:60px;height:24px;background:#0f3460;border-radius:4px;"></div>
          <div style="flex:1;height:28px;background:#0f3460;border-radius:4px;"></div>
          <div style="width:70px;height:28px;background:#e94560;border-radius:4px;"></div>
        </div>
        <div style="display:flex;gap:4px;flex-wrap:wrap;flex:1;">
          <div style="width:48%;aspect-ratio:1;background:#16213e;border-radius:4px;"></div>
          <div style="width:48%;aspect-ratio:1;background:#16213e;border-radius:4px;"></div>
          <div style="width:48%;aspect-ratio:1;background:#16213e;border-radius:4px;"></div>
          <div style="width:48%;aspect-ratio:1;background:#16213e;border-radius:4px;"></div>
        </div>
        <div style="text-align:center;font-size:11px;color:#7a7a9e;">每行 2 / 3 / 4 / 6 切换</div>
      </div>
    </div>
    <div class="card-body">
      <h3>A：文件夹选择 + 网格浏览</h3>
      <p>保持顶部文件夹选择栏，下方展示该文件夹所有照片的缩略图网格。用滑块或按钮切换每行列数来调整密度。</p>
    </div>
  </div>

  <div class="card" data-choice="b" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background:#1a1a2e;padding:16px;min-height:200px;display:flex;flex-direction:column;gap:8px;">
        <div style="display:flex;gap:4px;padding:0;">
          <div style="width:30%;aspect-ratio:1.2;background:#16213e;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#e94560;">📷 旅行</div>
          <div style="width:30%;aspect-ratio:1.2;background:#16213e;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#e94560;">📷 人像</div>
          <div style="width:30%;aspect-ratio:1.2;background:#16213e;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#e94560;">📷 风景</div>
        </div>
        <div style="border-top:1px solid #16213e;padding-top:8px;display:flex;gap:4px;flex-wrap:wrap;flex:1;">
          <div style="width:32%;aspect-ratio:1;background:#1e2a4a;border-radius:3px;"></div>
          <div style="width:32%;aspect-ratio:1;background:#1e2a4a;border-radius:3px;"></div>
          <div style="width:32%;aspect-ratio:1;background:#1e2a4a;border-radius:3px;"></div>
          <div style="width:32%;aspect-ratio:1;background:#1e2a4a;border-radius:3px;"></div>
          <div style="width:32%;aspect-ratio:1;background:#1e2a4a;border-radius:3px;"></div>
          <div style="width:32%;aspect-ratio:1;background:#1e2a4a;border-radius:3px;"></div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>B：文件夹卡片 + 展开网格</h3>
      <p>顶部展示文件夹封面卡片（取一张代表图），点击展开后下方显示该文件夹的网格。可同时展开多个文件夹对比浏览。</p>
    </div>
  </div>
</div>
